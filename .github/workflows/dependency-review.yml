name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dep-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency review
        # The GitHub-hosted action requires Dependency Graph (and on
        # private repos, GitHub Advanced Security). On this repo the
        # API call fails with "Dependency review is not supported on
        # this repository", which previously failed every PR. Mark it
        # continue-on-error so it still runs (and surfaces findings if
        # GHAS is enabled later) without blocking the merge check.
        continue-on-error: true
        uses: actions/dependency-review-action@595b5aeba73380359d98a5e087f648dbb0edce1b # v4.7.3
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Reject copyleft licenses that would change FORGE's distribution
          # terms; libredwg-tools (GPL) runs as a subprocess, not linked.
          deny-licenses: >-
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0-only,
            GPL-3.0-or-later
