name: release

# FORGE — tag-driven release pipeline.
#
# Triggers when a tag matching v*.*.* is pushed (e.g. v0.4.0). Builds:
#   - portable archives for Linux x64, macOS arm64, macOS x64, Windows x64
#     (each contains node_modules, dist/, server/, scripts/, etc.)
#   - container image, pushed to GitHub Container Registry, signed with
#     cosign keyless (Sigstore Fulcio + Rekor) and attested via the
#     Actions OIDC build-provenance attestation
#   - CycloneDX SBOM
#   - SHA-256 + SHA-512 checksum manifest
#
# All artifacts are published to a draft GitHub Release for review.
# Manual workflow_dispatch is also supported for dry-runs.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: current)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: "1"
  HUSKY: "0"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build platform-native archives. Each builds dist/ + prod node_modules.
  # ---------------------------------------------------------------------------
  archives:
    name: Archive (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            os: ubuntu-latest
            archive_ext: tar.gz
          - target: macos-arm64
            os: macos-14
            archive_ext: tar.gz
          - target: macos-x64
            os: macos-13
            archive_ext: tar.gz
          - target: windows-x64
            os: windows-latest
            archive_ext: zip
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies (build)
        run: npm ci --no-audit --no-fund

      - name: Build production SPA
        run: npm run build

      - name: Prune to production deps
        run: npm prune --omit=dev --no-audit --no-fund

      - name: Stage release contents
        shell: bash
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          if [ -z "$ver" ] || [ "$ver" = "$GITHUB_REF_NAME" ]; then
            ver="$(node -e "console.log(require('./package.json').version)")"
          fi
          name="forge-${ver}-${{ matrix.target }}"
          mkdir -p "release/${name}"
          # Files needed at runtime.
          cp -R dist server src docs scripts config "release/${name}/"
          cp index.html app.js styles.css manifest.webmanifest icon.svg \
             package.json package-lock.json LICENSE README.md PRODUCT_SPEC.md \
             "release/${name}/" 2>/dev/null || true
          cp -R node_modules "release/${name}/node_modules"
          # Strip source maps from the runtime bundle to save space; debug
          # builds keep them, releases don't.
          find "release/${name}/dist" -name "*.map" -delete || true
          # Convenience launcher scripts.
          cat > "release/${name}/start.sh" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cd "$(dirname "$0")"
          exec node server/main.js
          EOF
          chmod +x "release/${name}/start.sh"
          cat > "release/${name}/start.cmd" <<'EOF'
          @echo off
          cd /d %~dp0
          node server\main.js
          EOF
          echo "RELEASE_NAME=${name}" >> $GITHUB_ENV
          echo "RELEASE_VERSION=${ver}" >> $GITHUB_ENV

      - name: Pack tar.gz
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd release
          tar -czf "${RELEASE_NAME}.tar.gz" "${RELEASE_NAME}"
          ls -la "${RELEASE_NAME}.tar.gz"

      - name: Pack zip (Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Set-Location release
          Compress-Archive -Path $env:RELEASE_NAME -DestinationPath "$env:RELEASE_NAME.zip" -Force
          Get-ChildItem "$env:RELEASE_NAME.zip"

      - name: Compute checksums
        shell: bash
        run: |
          cd release
          file="${RELEASE_NAME}.${{ matrix.archive_ext }}"
          # POSIX shasum is everywhere; no external deps required.
          shasum -a 256 "$file" > "${file}.sha256"
          shasum -a 512 "$file" > "${file}.sha512"
          cat "${file}.sha256"

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forge-${{ matrix.target }}
          path: |
            release/${{ env.RELEASE_NAME }}.${{ matrix.archive_ext }}
            release/${{ env.RELEASE_NAME }}.${{ matrix.archive_ext }}.sha256
            release/${{ env.RELEASE_NAME }}.${{ matrix.archive_ext }}.sha512
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 2. SBOM (CycloneDX). One artifact for the whole release.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Generate SBOM
        run: npm run sbom

      - name: Rename SBOM with version
        run: |
          ver="${GITHUB_REF_NAME#v}"
          [ -z "$ver" ] && ver="$(node -e "console.log(require('./package.json').version)")"
          mv bom.json "forge-${ver}.cdx.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: forge-sbom
          path: forge-*.cdx.json
          if-no-files-found: error
          retention-days: 90

  # ---------------------------------------------------------------------------
  # 3. Container image. Pushes to GHCR, signs keyless, attests provenance.
  # ---------------------------------------------------------------------------
  container:
    name: Container image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write       # cosign keyless OIDC + provenance attestation
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Container metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # 4. Publish a draft GitHub Release with all artifacts.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [archives, sbom, container]
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Aggregate checksum manifest
        run: |
          set -euo pipefail
          cd dist-artifacts
          : > SHA256SUMS
          for f in $(ls *.tar.gz *.zip 2>/dev/null || true); do
            shasum -a 256 "$f" >> SHA256SUMS
          done
          cat SHA256SUMS

      - name: Attest archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist-artifacts/*.tar.gz
            dist-artifacts/*.zip
            dist-artifacts/*.cdx.json

      - name: Create draft release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist-artifacts/*.tar.gz
            dist-artifacts/*.zip
            dist-artifacts/*.sha256
            dist-artifacts/*.sha512
            dist-artifacts/*.cdx.json
            dist-artifacts/SHA256SUMS
          body: |
            ## FORGE ${{ github.ref_name }}

            Self-hostable on Windows, Linux, and macOS servers, or as a container.

            ### Verifying downloads

            ```bash
            # SHA-256 of every archive in this release
            sha256sum -c SHA256SUMS

            # Container image (replace TAG with the version below)
            cosign verify ghcr.io/${{ github.repository }}:TAG \
              --certificate-identity-regexp 'https://github\\.com/${{ github.repository }}/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```

            ### Artifacts

            | Target            | File                                               |
            | ----------------- | -------------------------------------------------- |
            | Linux x64         | forge-${{ github.ref_name }}-linux-x64.tar.gz      |
            | macOS arm64       | forge-${{ github.ref_name }}-macos-arm64.tar.gz    |
            | macOS x64         | forge-${{ github.ref_name }}-macos-x64.tar.gz      |
            | Windows x64       | forge-${{ github.ref_name }}-windows-x64.zip       |
            | Container image   | ghcr.io/${{ github.repository }}                   |
            | SBOM (CycloneDX)  | forge-*.cdx.json                                   |
