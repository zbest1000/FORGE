name: container-scan

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "src/**"
      - ".github/workflows/container-scan.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "server/**"
      - "src/**"
      - ".github/workflows/container-scan.yml"
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: container-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (load to local daemon)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: forge:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy filesystem scan (config + secrets + license)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          scanners: vuln,secret,misconfig

      - name: Upload filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@717e230604b28efc38d8b4d3737d0611b16bc19a # v3.30.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: forge:scan
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@717e230604b28efc38d8b4d3737d0611b16bc19a # v3.30.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Fail on CRITICAL findings
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: forge:scan
          format: table
          ignore-unfixed: true
          severity: CRITICAL
          exit-code: "1"
