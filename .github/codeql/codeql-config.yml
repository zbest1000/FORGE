# CodeQL configuration for FORGE.
#
# The default JavaScript query pack flags route handlers as
# `js/missing-rate-limiting` whenever the handler touches a
# database. FORGE applies global rate limiting via
# `@fastify/rate-limit` registered in `server/main.js`:
#
#   await app.register(rateLimit, {
#     global: true,
#     allowList: (req) => !(p.startsWith("/api/") || p.startsWith("/v1/")),
#     keyGenerator: (req) => req.user?.id || req.ip || "anon",
#   });
#
# Auth handlers are additionally protected by per-account login
# lockout in `server/security/lockout.js`. CodeQL's interprocedural
# data-flow analysis can't trace through Fastify's plugin
# registration to recognise the global limiter, so every API route
# trips the rule. The result is dozens of false positives that
# drown out genuine findings.
#
# Disable the specific rule below; everything else from
# `security-extended` + `security-and-quality` stays on. If a new
# unauthenticated entry point is added that is NOT covered by the
# global limiter (e.g. a raw `node:http` server), this should be
# revisited.

name: "FORGE CodeQL configuration"

queries:
  - uses: security-extended
  - uses: security-and-quality

query-filters:
  - exclude:
      id: js/missing-rate-limiting
