# Reference docker-compose for self-hosted FORGE.
# `docker compose up -d` brings up the single-node bundle.
# `docker compose --profile distributed up -d` adds distributed-ready
# infrastructure (worker role, Postgres/NATS/OTel collector) used by the
# outbox/connector extraction path.
#
# Run `docker compose run --rm forge node server/seed.js` once to seed.

services:
  forge:
    build: .
    image: forge:local
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      NODE_ENV: production
      FORGE_JWT_SECRET: ${FORGE_JWT_SECRET:-change-me-in-production}
      FORGE_TENANT_KEY: ${FORGE_TENANT_KEY:-change-me-in-production}
      FORGE_DATA_DIR: /app/data
      # Enable MQTT bridge by uncommenting (requires the mosquitto service below).
      # FORGE_MQTT_URL: mqtt://mosquitto:1883
      # FORGE_MQTT_TOPICS: "forge/#"
      # Talk to the n8n service over the internal network.
      FORGE_N8N_URL: http://n8n:5678
      FORGE_N8N_API_KEY: ${FORGE_N8N_API_KEY:-}
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      LOG_LEVEL: info
    volumes:
      - forge-data:/app/data
    depends_on:
      - mosquitto
      - n8n

  forge-worker:
    build: .
    image: forge:local
    profiles: ["distributed"]
    restart: unless-stopped
    command: ["node", "server/main.js"]
    environment:
      PORT: 3001
      NODE_ENV: production
      FORGE_JWT_SECRET: ${FORGE_JWT_SECRET:-change-me-in-production}
      FORGE_TENANT_KEY: ${FORGE_TENANT_KEY:-change-me-in-production}
      FORGE_DATA_DIR: /app/data
      FORGE_WORKER_ROLE: outbox-connectors
      FORGE_OTEL_ENABLED: ${FORGE_OTEL_ENABLED:-1}
      OTEL_SERVICE_NAME: forge-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
      LOG_LEVEL: info
    volumes:
      - forge-data:/app/data
    depends_on:
      - forge
      - nats
      - otel-collector

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"  # MQTT
      - "9001:9001"  # WebSocket MQTT
    volumes:
      - ./deploy/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

  # n8n — workflow automation engine (Sustainable Use License).
  # 400+ pre-built connectors (SAP/ServiceNow/Slack/SharePoint/etc.) cover
  # spec §6.2 "Automation rules from integration events". FORGE talks to it
  # via REST + GraphQL inbound and signed webhooks outbound.
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678/}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-changeme}
      # Mount our pre-built workflow templates (read-only) so an operator can
      # import them once n8n is up.
      N8N_USER_FOLDER: /home/node
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./deploy/n8n-templates:/templates:ro

  postgres:
    image: postgres:16-alpine
    profiles: ["distributed"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forge}
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forge-dev-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  nats:
    image: nats:2-alpine
    profiles: ["distributed"]
    restart: unless-stopped
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles: ["distributed"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./deploy/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4318:4318"
      - "4317:4317"

volumes:
  forge-data:
  mosquitto-data:
  mosquitto-log:
  n8n-data:
  postgres-data:
