<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORGE — Engineering Collaboration Platform</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#0ea5e9" />

    <!--
      Import map — third-party OSS loaded as ES modules via esm.sh.
      All packages are MIT / Apache 2.0 / BSD / MPL; see docs/THIRD_PARTY.md.
      Every import is dynamic and fails gracefully: if the CDN is unreachable
      the hand-rolled fallback in src/core/* runs instead.
    -->
    <script type="importmap">
    {
      "imports": {
        "minisearch":  "https://esm.sh/minisearch@7.1.2?bundle",
        "dexie":       "https://esm.sh/dexie@4.0.11?bundle",
        "marked":      "https://esm.sh/marked@14.1.3?bundle",
        "dompurify":   "https://esm.sh/dompurify@3.1.7?bundle",
        "mermaid":     "https://esm.sh/mermaid@11.4.1?bundle",
        "svg-pan-zoom":"https://esm.sh/svg-pan-zoom@3.6.2?bundle",
        "uplot":       "https://esm.sh/uplot@1.6.31?bundle",
        "mqtt":        "https://esm.sh/mqtt@5.10.1?bundle",
        "web-ifc":     "https://esm.sh/web-ifc@0.0.66?bundle",
        "fuse.js":     "https://esm.sh/fuse.js@7.0.0?bundle",
        "date-fns":    "https://esm.sh/date-fns@4.1.0?bundle",
        "pdfjs-dist":  "https://esm.sh/pdfjs-dist@5.0.0/build/pdf.mjs",
        "papaparse":   "https://esm.sh/papaparse@5.4.1?bundle",
        "xstate":      "https://esm.sh/xstate@5.30.0?bundle",
        "three":       "https://esm.sh/three@0.169.0?bundle",
        "dxf-viewer":  "https://esm.sh/dxf-viewer@1.1.7?bundle&deps=three@0.169.0",
        "online-3d-viewer": "https://esm.sh/online-3d-viewer@0.16.0?bundle&deps=three@0.169.0"
      }
    }
    </script>

    <!-- Vendor packages and styles are bundled by Vite for production.
      The import map remains as a source-serving fallback only. -->
  </head>
  <!--
    Pre-paint theme resolution (UX-A). The body class drives FORGE's
    light/dark theme tokens; running this before first paint avoids the
    "flash of wrong theme" returning users would otherwise see when
    their persisted preference is light. Logic kept in lockstep with
    `src/core/theme.js::applyInitialTheme()` — the JS module is the
    canonical implementation and the source of unit-test coverage; this
    inline copy is intentionally minimal so it parses + executes before
    any deferred module fetches resolve.

    The script writes the class onto `document.documentElement` (so it
    can paint the bg colour during the brief moment before <body>
    parses) AND a `data-initial-theme` attribute the boot path reads
    when constructing the body class. `app.js::applyTheme()` is still
    the canonical applier post-boot.
  -->
  <script>
  (function () {
    var theme = "dark";
    try {
      var raw = localStorage.getItem("forge.state.v1");
      if (raw) {
        var p = JSON.parse(raw);
        var t = p && p.ui && p.ui.theme;
        if (t === "dark" || t === "light") theme = t;
        else if (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) theme = "light";
      } else if (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) {
        theme = "light";
      }
    } catch (_e) { /* swallow — fall back to dark */ }
    var de = document.documentElement;
    de.classList.add("theme-" + theme);
    de.dataset.initialTheme = theme;
    de.style.colorScheme = theme;
  })();
  </script>
  <body>
    <a href="#screenContainer" class="skip-link">Skip to main content</a>
    <div id="app" class="app-shell">
      <aside class="far-left-rail" id="farLeftRail" aria-label="Primary navigation"></aside>
      <aside class="left-panel" id="leftPanel" aria-label="Workspace navigator"></aside>
      <main class="main-content" aria-label="Main content">
        <header class="main-header" id="mainHeader"></header>
        <section id="screenContainer" class="screen-container" tabindex="-1"></section>
      </main>
      <aside class="right-context-panel" id="contextPanel" aria-label="Context panel"></aside>
    </div>

    <section id="operationsDock" class="operations-dock hidden"></section>

    <button id="layoutRestore" class="layout-restore" title="Restore layout" aria-label="Restore layout">⛶</button>

    <div id="modalRoot"></div>
    <div id="toastRoot" class="toast-root" role="status" aria-live="polite" aria-atomic="false"></div>
    <div id="paletteRoot"></div>

    <script type="module" src="app.js"></script>
  </body>
</html>
