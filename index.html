<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORGE MVP Shell</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <aside class="far-left-rail">
        <div class="logo">FORGE</div>
        <nav id="globalNav"></nav>
        <div class="rail-footer">
          <button id="toggleDockBtn" class="ghost">Dock</button>
          <button id="toggleThemeBtn" class="ghost">Theme</button>
        </div>
      </aside>

      <aside class="left-panel">
        <header class="panel-title">Workspace</header>
        <section class="quick-actions">
          <button id="newWorkItemBtn">+ Work Item</button>
          <button id="newIncidentBtn">+ Incident</button>
        </section>
        <div id="workspaceTree" class="tree"></div>
      </aside>

      <main class="main-content">
        <header class="main-header">
          <div>
            <h1 id="screenTitle">FORGE</h1>
            <p id="screenSubtitle"></p>
          </div>
          <div class="header-controls">
            <label>
              Role
              <select id="roleSelect"></select>
            </label>
            <input id="searchInput" placeholder="Search docs, assets, revisions..." />
          </div>
        </header>

        <section id="screenLayout" class="screen-layout"></section>
      </main>

      <aside class="right-context-panel">
        <header class="panel-title">Context</header>
        <div id="contextPanel"></div>
      </aside>
    </div>

    <section id="operationsDock" class="operations-dock hidden"></section>

    <template id="panelBlockTemplate">
      <article class="panel-block">
        <h3></h3>
        <ul></ul>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
